name: CI Pytest

on:
  pull_request:
    paths:
      - "backend/**"
      - "executor/**"
      - "executor_manager/**"
      - ".github/workflows/ci-pytest.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "executor/**"
      - "executor_manager/**"
      - ".github/workflows/ci-pytest.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend
          - executor
          - executor_manager
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          uv sync --all-extras --all-groups
        env:
          UV_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          uv run pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .
